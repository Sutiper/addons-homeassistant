configuration:
  auth_mode:
    name: Mode d'authentification
    description: "key_only: clé publique uniquement | password_only: mot de passe uniquement | key_or_password: les deux"
  authorized_keys:
    name: Clés publiques autorisées
    description: Liste des clés publiques SSH autorisées à se connecter.
  password:
    name: Mot de passe
    description: Mot de passe pour l'utilisateur hassio.
  allow_root_login:
    name: Autoriser la connexion root
    description: Permet la connexion directe en tant que root. Non recommandé.
  allow_tcp_forwarding:
    name: Autoriser le TCP forwarding
    description: Permet le transfert de ports TCP.
  allow_agent_forwarding:
    name: Autoriser l'agent forwarding
    description: Permet le transfert de l'agent SSH.
  sftp_enabled:
    name: Activer le SFTP
    description: Active le sous-système SFTP pour le transfert de fichiers.
  sftp_only:
    name: Mode SFTP uniquement
    description: Restreint l'accès au SFTP sans shell interactif.
  log_level:
    name: Niveau de log
    description: "Verbosité des logs : DEBUG, INFO, WARNING, ERROR"
  banner:
    name: Bannière de connexion
    description: Message affiché avant l'authentification.
