<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E3A5F"/>
      <stop offset="100%" style="stop-color:#13B5EA"/>
    </linearGradient>
    <linearGradient id="shine2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg2)"/>
  <rect width="512" height="512" rx="96" ry="96" fill="url(#shine2)"/>

  <!-- Serveur distant (haut gauche) -->
  <rect x="60" y="80" width="140" height="100" rx="14" fill="none" stroke="#13B5EA" stroke-width="14"/>
  <rect x="82" y="105" width="60" height="12" rx="5" fill="#13B5EA" opacity="0.8"/>
  <rect x="82" y="127" width="40" height="12" rx="5" fill="#13B5EA" opacity="0.5"/>
  <circle cx="166" cy="118" r="10" fill="#4ADE80"/>

  <!-- Agent local (bas droite) -->
  <rect x="312" y="332" width="140" height="100" rx="14" fill="none" stroke="#ffffff" stroke-width="14"/>
  <rect x="334" y="357" width="60" height="12" rx="5" fill="#ffffff" opacity="0.8"/>
  <rect x="334" y="379" width="40" height="12" rx="5" fill="#ffffff" opacity="0.5"/>
  <circle cx="418" cy="370" r="10" fill="#FFB800"/>

  <!-- Ligne de tunnel entre les deux -->
  <line x1="200" y1="145" x2="312" y2="355" stroke="#13B5EA" stroke-width="6" stroke-dasharray="18,10"/>

  <!-- Flèche sur la ligne (sens agent → serveur) -->
  <polygon points="248,235 270,210 275,245" fill="#13B5EA" opacity="0.9"/>

  <!-- Badge EDGE -->
  <rect x="170" y="225" width="130" height="46" rx="14" fill="#13B5EA"/>
  <text x="235" y="256" font-family="Arial Black, Arial" font-weight="900" font-size="20" fill="#ffffff" text-anchor="middle">EDGE</text>

  <!-- Antenne signal en haut à droite -->
  <circle cx="390" cy="108" r="12" fill="#4ADE80"/>
  <path d="M390 96 Q390 70 415 55" stroke="#4ADE80" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M390 96 Q365 70 340 75" stroke="#4ADE80" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.6"/>
</svg>
