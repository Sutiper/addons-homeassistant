configuration:
  edge_key:
    name: Edge Key
    description: Edge key generated by Portainer when creating the environment.
  edge_id:
    name: Edge ID
    description: Unique identifier for this environment (e.g. homeassistant-rpi5).
  edge_insecure_poll:
    name: Disable TLS verification
    description: Allow connections without TLS certificate verification.
  log_level:
    name: Log level
    description: Agent log verbosity (DEBUG, INFO, WARN, ERROR).
