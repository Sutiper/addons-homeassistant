name: Auto-update Portainer versions

on:
  schedule:
    # Tous les jours à 4h du matin
    - cron: "0 4 * * *"
  workflow_dispatch:

env:
  # Opt-in Node.js 24 pour éviter le warning de dépréciation
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-portainer:
    name: Check and update Portainer versions
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ─────────────────────────────────────────
      # PORTAINER EE
      # ─────────────────────────────────────────

      - name: Get Portainer EE STS digest
        id: ee_remote
        run: |
          DIGEST=$(curl -s "https://hub.docker.com/v2/repositories/portainer/portainer-ee/tags/sts" \
            | jq -r '.digest' | cut -c8-15)
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT
          echo "EE digest actuel : ${DIGEST}"

      - name: Get stored EE digest
        id: ee_stored
        run: |
          STORED=$(cat .portainer_ee_digest 2>/dev/null || echo "")
          echo "digest=${STORED}" >> $GITHUB_OUTPUT
          echo "EE digest stocké : ${STORED}"

      - name: Bump Portainer EE version
        if: steps.ee_remote.outputs.digest != steps.ee_stored.outputs.digest && steps.ee_remote.outputs.digest != ''
        run: |
          OLD=$(grep '^version:' portainer_ee/config.yaml | awk '{print $2}' | tr -d '"')
          MAJOR=$(echo $OLD | cut -d. -f1)
          MINOR=$(echo $OLD | cut -d. -f2)
          PATCH=$(echo $OLD | cut -d. -f3)
          NEW="${MAJOR}.${MINOR}.$((PATCH + 1))"
          DATE=$(date +%Y-%m-%d)

          echo "EE : ${OLD} → ${NEW}"

          sed -i "s/^version: \"${OLD}\"/version: \"${NEW}\"/" portainer_ee/config.yaml
          sed -i "s/io.hass.version=\"${OLD}\"/io.hass.version=\"${NEW}\"/" portainer_ee/Dockerfile
          printf "## ${NEW} — ${DATE}\n\n- Mise à jour automatique Portainer EE (STS)\n\n" \
            | cat - portainer_ee/CHANGELOG.md > /tmp/cl && mv /tmp/cl portainer_ee/CHANGELOG.md

          echo "${{ steps.ee_remote.outputs.digest }}" > .portainer_ee_digest

          git add portainer_ee/config.yaml portainer_ee/Dockerfile portainer_ee/CHANGELOG.md .portainer_ee_digest
          git commit -m "chore: bump portainer_ee to ${NEW} (STS update)"

      # ─────────────────────────────────────────
      # PORTAINER AGENT
      # ─────────────────────────────────────────

      - name: Get Portainer Agent latest digest
        id: agent_remote
        run: |
          DIGEST=$(curl -s "https://hub.docker.com/v2/repositories/portainer/agent/tags/latest" \
            | jq -r '.digest' | cut -c8-15)
          echo "digest=${DIGEST}" >> $GITHUB_OUTPUT
          echo "Agent digest actuel : ${DIGEST}"

      - name: Get stored Agent digest
        id: agent_stored
        run: |
          STORED=$(cat .portainer_agent_digest 2>/dev/null || echo "")
          echo "digest=${STORED}" >> $GITHUB_OUTPUT
          echo "Agent digest stocké : ${STORED}"

      - name: Bump Portainer Agent version
        if: steps.agent_remote.outputs.digest != steps.agent_stored.outputs.digest && steps.agent_remote.outputs.digest != ''
        run: |
          OLD=$(grep '^version:' portainer_agent/config.yaml | awk '{print $2}' | tr -d '"')
          MAJOR=$(echo $OLD | cut -d. -f1)
          MINOR=$(echo $OLD | cut -d. -f2)
          PATCH=$(echo $OLD | cut -d. -f3)
          NEW="${MAJOR}.${MINOR}.$((PATCH + 1))"
          DATE=$(date +%Y-%m-%d)

          echo "Agent : ${OLD} → ${NEW}"

          sed -i "s/^version: \"${OLD}\"/version: \"${NEW}\"/" portainer_agent/config.yaml
          sed -i "s/io.hass.version=\"${OLD}\"/io.hass.version=\"${NEW}\"/" portainer_agent/Dockerfile
          printf "## ${NEW} — ${DATE}\n\n- Mise à jour automatique Portainer Agent\n\n" \
            | cat - portainer_agent/CHANGELOG.md > /tmp/cl && mv /tmp/cl portainer_agent/CHANGELOG.md

          echo "${{ steps.agent_remote.outputs.digest }}" > .portainer_agent_digest

          git add portainer_agent/config.yaml portainer_agent/Dockerfile portainer_agent/CHANGELOG.md .portainer_agent_digest
          git commit -m "chore: bump portainer_agent to ${NEW} (latest update)"

      # ─────────────────────────────────────────
      # PUSH UNIQUE À LA FIN
      # ─────────────────────────────────────────

      - name: Push changes
        run: |
          git pull --rebase origin main
          git push origin main
