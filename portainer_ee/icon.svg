<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#13B5EA"/>
      <stop offset="100%" style="stop-color:#0D7FB3"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <rect width="512" height="512" rx="96" ry="96" fill="url(#shine)"/>

  <!-- Portainer whale/container icon stylisé -->
  <!-- Corps principal du conteneur -->
  <rect x="96" y="180" width="320" height="200" rx="20" ry="20" fill="none" stroke="#ffffff" stroke-width="20"/>

  <!-- Trois lignes "conteneurs" dans la boîte -->
  <rect x="130" y="222" width="100" height="28" rx="8" fill="#ffffff" opacity="0.9"/>
  <rect x="130" y="268" width="150" height="28" rx="8" fill="#ffffff" opacity="0.7"/>
  <rect x="130" y="314" width="80" height="28" rx="8" fill="#ffffff" opacity="0.5"/>

  <!-- Fleche play droite = "run" -->
  <polygon points="310,246 370,280 310,314" fill="#ffffff" opacity="0.95"/>

  <!-- Badge "EE" en haut à droite -->
  <rect x="340" y="110" width="100" height="44" rx="12" fill="#FFB800"/>
  <text x="390" y="140" font-family="Arial Black, Arial" font-weight="900" font-size="22" fill="#1a1a1a" text-anchor="middle">EE</text>

  <!-- Point de connexion en haut -->
  <circle cx="256" cy="155" r="18" fill="#ffffff"/>
  <line x1="256" y1="173" x2="256" y2="180" stroke="#ffffff" stroke-width="8"/>
</svg>
